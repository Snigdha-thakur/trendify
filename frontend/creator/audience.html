        Per page:<select class="c-perpage" id="perPage" onchange="renderTable()"><option value="15" selected>15</option><option value="25">25</option><option value="50">50</option><option value="100">100</option></select>

<script src="creator-api.js"></script>
<script>
var all=[],filtered=[],page=1,_timer=null;
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-IN'):'—';}
function fmtAmt(a){return '₹'+parseFloat(a||0).toLocaleString('en-IN');}
function initUser(){var u=null;try{u=JSON.parse(localStorage.getItem('trendify_user'));}catch(e){}if(!u)return;var ini=(u.name||'CR').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);document.getElementById('sbAv').textContent=ini;document.getElementById('sbName').textContent=u.name||'Creator';var idDisplay=(u.email&&u.email.trim())||(u.username&&u.username.trim())||u.id||u._id||'';document.getElementById('sbEmail').textContent=idDisplay;document.getElementById('sbAv2').textContent=ini;document.getElementById('sbName2').textContent=u.name||'Creator';document.getElementById('sbEmail2').textContent=idDisplay;if(localStorage.getItem('_from_admin'))document.getElementById('backBtn').style.display='inline-flex';}
function toggleUserMenu(e){e.stopPropagation();document.getElementById('userPopup').classList.toggle('open');}
document.addEventListener('click',function(e){var p=document.getElementById('userPopup'),u=document.getElementById('sbUser');if(p&&!p.contains(e.target)&&u&&!u.contains(e.target))p.classList.remove('open');});
document.addEventListener('DOMContentLoaded',function(){var btn=document.getElementById('signOutBtn');if(btn)btn.addEventListener('click',function(){localStorage.removeItem('trendify_access_token');localStorage.removeItem('trendify_user');window.location.href='../signin.html';});});
async function load(){
  document.getElementById('loadErr').style.display='none';
  try{
    var txns=await CreatorAPI.getTransactions();
    var map={};
    txns.forEach(function(t){
      if(!t.buyer_email)return;
      if(!map[t.buyer_email]){
        map[t.buyer_email]={name:t.buyer_name||'—',email:t.buyer_email,phone:t.buyer_phone||'—',count:0,spent:0,first:t.created_at};
      }
      if(t.status==='Success'){map[t.buyer_email].count++;map[t.buyer_email].spent+=parseFloat(t.amount||0);}
      if(new Date(t.created_at)<new Date(map[t.buyer_email].first))map[t.buyer_email].first=t.created_at;
    });
    all=Object.values(map).sort(function(a,b){return new Date(b.first)-new Date(a.first);});
    var totalRev=all.reduce(function(s,r){return s+r.spent;},0);
    document.getElementById('statTotal').textContent=all.length;
    document.getElementById('statRev').textContent=fmtAmt(totalRev);
    filterTable();
  }catch(e){
    document.getElementById('loadErr').textContent='Error: '+e.message;
    document.getElementById('loadErr').style.display='block';
  }
}
function filterTable(){var q=document.getElementById('searchInput').value.trim().toLowerCase();filtered=q?all.filter(function(r){return (r.name||'').toLowerCase().includes(q)||(r.email||'').toLowerCase().includes(q)||(r.phone||'').includes(q);}):all.slice();page=1;renderTable();}
function renderTable(){
  var pp=parseInt(document.getElementById('perPage').value);
  var total=Math.max(1,Math.ceil(filtered.length/pp));
  if(page>total)page=total;
  var slice=filtered.slice((page-1)*pp,page*pp);
  var tbody=document.getElementById('tbody');
  var empty=document.getElementById('empty');
  if(!slice.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=slice.map(function(r){
    return '<tr>'
      +'<td style="font-weight:600;color:var(--text)">'+r.name+'</td>'
      +'<td style="color:#7c3aed">'+r.email+'</td>'
      +'<td style="font-family:var(--f-mono);font-size:12px">'+r.phone+'</td>'
      +'<td style="text-align:center">'+r.count+'</td>'
      +'<td style="font-weight:700;color:var(--text)">'+fmtAmt(r.spent)+'</td>'
      +'<td style="font-weight:500">'+fmtDate(r.first)+'</td></tr>';
  }).join('');
  renderPag(total);
}
function renderPag(total){var pg=document.getElementById('pagination');if(total<=1){pg.innerHTML='';return;}var h='<button class="c-pg" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';for(var i=1;i<=total;i++){if(total>7&&i>2&&i<total-1&&Math.abs(i-page)>1){if(i===3||i===total-2)h+='<span class="c-pg" style="cursor:default;opacity:.4">…</span>';continue;}h+='<button class="c-pg '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';}h+='<button class="c-pg" onclick="goPage('+(page+1)+')" '+(page===total?'disabled':'')+'>›</button>';pg.innerHTML=h;}
function goPage(n){var pp=parseInt(document.getElementById('perPage').value);var total=Math.ceil(filtered.length/pp);if(n<1||n>total)return;page=n;renderTable();}
function backToAdmin(){var tok=localStorage.getItem('_admin_token_backup');var usr=localStorage.getItem('_admin_user_backup');if(tok){localStorage.setItem('trendify_access_token',tok);localStorage.setItem('trendify_user',usr||'');}localStorage.removeItem('_from_admin');localStorage.removeItem('_admin_token_backup');localStorage.removeItem('_admin_user_backup');window.location.href='../admin/overview.html';}window.backToAdmin=backToAdmin;function toggleSidebar(){document.getElementById('sidebar').classList.toggle('expanded');}
function toggleTheme(){document.body.classList.toggle('dark');}
window.goPage=goPage;window.filterTable=filterTable;window.renderTable=renderTable;
initUser();load();
_timer=setInterval(load,30000);
</script>
