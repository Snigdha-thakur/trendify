<script src="creator-api.js"></script>
<script>
var all=[],filtered=[],page=1,userEmail='';
function fmt(d){return d?new Date(d).toLocaleString('en-IN',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';}
function fmtAmt(a){return '₹'+parseFloat(a||0).toLocaleString('en-IN');}
function copy(t,b){navigator.clipboard.writeText(t).then(function(){b.textContent='✓';setTimeout(function(){b.textContent='⧉';},1200);});}
function initUser(){var u=null;try{u=JSON.parse(localStorage.getItem('trendify_user'));}catch(e){}if(!u)return;var ini=(u.name||'CR').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);document.getElementById('sbAv').textContent=ini;document.getElementById('sbName').textContent=u.name||'Creator';var idDisplay=(u.email&&u.email.trim())||(u.username&&u.username.trim())||u.id||u._id||'';document.getElementById('sbEmail').textContent=idDisplay;userEmail=u.email||'';if(u.role==='admin')document.getElementById('backBtn').style.display='inline-flex';}
async function load(){
  var bal=await CreatorAPI.getWalletBalance();
  document.getElementById('walletBal').textContent=fmtAmt(bal.wallet_balance);
  var logs=await CreatorAPI.getWalletLogs();
  all=logs;filtered=[...all];
  document.getElementById('totalLogs').textContent=all.length;
  renderTable();
}
function filterTable(){var q=document.getElementById('searchInput').value.trim().toLowerCase();filtered=q?all.filter(function(r){return (r.transaction_id||'').toLowerCase().includes(q)||(userEmail).toLowerCase().includes(q);}):all.slice();page=1;renderTable();}
function renderTable(){
  var pp=parseInt(document.getElementById('perPage').value);
  var total=Math.max(1,Math.ceil(filtered.length/pp));
  if(page>total)page=total;
  var slice=filtered.slice((page-1)*pp,page*pp);
  var tbody=document.getElementById('tbody');
  var empty=document.getElementById('empty');
  if(!slice.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=slice.map(function(r){
    var txnId=r.transaction_id||'N/A';
    var typeBadge=r.type==='Credit'?'<span class="b-credit"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 13V3M3 8l5-5 5 5"/></svg> Credit</span>':'<span class="b-debit"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8l5 5 5-5"/></svg> Debit</span>';
    return '<tr>'
      +'<td><div style="display:flex;align-items:center;gap:5px"><button class="c-copy" onclick="copy(\''+userEmail+'\',this)">⧉</button><span style="font-size:13px">'+userEmail+'</span></div></td>'
      +'<td><div style="display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:11px;color:#7c3aed"><button class="c-copy" onclick="copy(\''+txnId+'\',this)">⧉</button>'+(txnId.length>30?txnId.slice(0,30)+'…':txnId)+'</div></td>'
      +'<td><span class="b-wallet">'+(r.wallet_type||'Main Wallet')+'</span></td>'
      +'<td>'+typeBadge+'</td>'
      +'<td style="font-family:var(--f-mono);font-size:12px">'+fmtAmt(r.existing_balance)+'</td>'
      +'<td style="font-weight:700;color:var(--text)">'+fmtAmt(r.amount)+'</td>'
      +'<td style="font-family:var(--f-mono);font-size:12px">'+fmtAmt(r.new_balance)+'</td>'
      +'<td style="white-space:nowrap;font-weight:600">'+fmt(r.created_at)+'</td></tr>';
  }).join('');
  renderPag(total);
}
function renderPag(total){var pg=document.getElementById('pagination');if(total<=1){pg.innerHTML='';return;}var h='<button class="c-pg" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';for(var i=1;i<=total;i++){if(total>7&&i>2&&i<total-1&&Math.abs(i-page)>1){if(i===3||i===total-2)h+='<span class="c-pg" style="cursor:default;opacity:.4">…</span>';continue;}h+='<button class="c-pg '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';}h+='<button class="c-pg" onclick="goPage('+(page+1)+')" '+(page===total?'disabled':'')+'>›</button>';pg.innerHTML=h;}
function goPage(n){var pp=parseInt(document.getElementById('perPage').value);var total=Math.ceil(filtered.length/pp);if(n<1||n>total)return;page=n;renderTable();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('expanded');}
function toggleTheme(){document.body.classList.toggle('dark');}
window.copy=copy;window.goPage=goPage;window.filterTable=filterTable;window.renderTable=renderTable;
initUser();load();
</script>
