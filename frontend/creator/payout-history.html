<script type="module" src="creator-api.js"></script>



<script>



var all=[],filtered=[],page=1,activeTab='all',_timer=null;



function fmt(d){return d?new Date(d).toLocaleString('en-IN',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';}



function fmtAmt(a){return '₹'+parseFloat(a||0).toLocaleString('en-IN');}



function copy(t,b){navigator.clipboard.writeText(t).then(function(){b.textContent='✓';setTimeout(function(){b.textContent='⧉';},1200);});}



function statusBadge(s){var cls=s==='Paid'?'b-success':s==='Pending'?'b-pending':'b-failed';return '<span class="'+cls+'">'+s+'</span>';}



function initUser(){var u=null;try{u=JSON.parse(localStorage.getItem('trendify_user'));}catch(e){}if(!u)return;var ini=(u.name||'CR').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);document.getElementById('sbAv').textContent=ini;document.getElementById('sbName').textContent=u.name||'Creator';var idDisplay=(u.email&&u.email.trim())||(u.username&&u.username.trim())||u.id||u._id||'';document.getElementById('sbEmail').textContent=idDisplay;document.getElementById('sbAv2').textContent=ini;document.getElementById('sbName2').textContent=u.name||'Creator';document.getElementById('sbEmail2').textContent=idDisplay;var navAv=document.getElementById('navAv');if(navAv)navAv.textContent=ini; if(localStorage.getItem('_from_admin'))document.getElementById('backBtn').style.display='inline-flex';}



function toggleUserMenu(e){e.stopPropagation();e.preventDefault();var p=document.getElementById('userPopup');if(p)p.classList.toggle('open');}



document.addEventListener('click',function(e){var p=document.getElementById('userPopup'),u=document.getElementById('sbUser'),n=document.getElementById('navAv');if(p&&p.classList.contains('open')&&!p.contains(e.target)&&(!u||!u.contains(e.target))&&(!n||!n.contains(e.target)))p.classList.remove('open');});



document.addEventListener('DOMContentLoaded',function(){var btn=document.getElementById('signOutBtn');if(btn)btn.addEventListener('click',function(){localStorage.removeItem('trendify_access_token');localStorage.removeItem('trendify_user');window.location.href='../signin.html';});var p=document.getElementById('userPopup');if(p)document.body.appendChild(p);});



function updateStats(){



  document.getElementById('statTotal').textContent=all.length;



  document.getElementById('statAmt').textContent=fmtAmt(all.reduce(function(s,r){return s+parseFloat(r.amount||0);},0));



  document.getElementById('statPaid').textContent=all.filter(function(r){return r.status==='Paid';}).length;



  document.getElementById('statPending').textContent=all.filter(function(r){return r.status==='Pending';}).length;



}



async function load(){



  document.getElementById('loadErr').style.display='none';



  try{



    all=await CreatorAPI.getPayouts();



    updateStats();filterTable();



  }catch(e){



    document.getElementById('loadErr').textContent='Error: '+e.message;



    document.getElementById('loadErr').style.display='block';



  }



}



function switchTab(tab,btn){activeTab=tab;document.querySelectorAll('.c-tab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');filterTable();}



function filterTable(){



  var q=document.getElementById('searchInput').value.trim().toLowerCase();



  var base=activeTab==='creator'?all.filter(function(r){return r.payout_type==='creator';}):activeTab==='referral'?all.filter(function(r){return r.payout_type==='referral';}):all.slice();



  filtered=q?base.filter(function(r){return (r.id||'').toLowerCase().includes(q);}):base;



  page=1;renderTable();



}



function renderTable(){



  var pp=parseInt(document.getElementById('perPage').value);



  var total=Math.max(1,Math.ceil(filtered.length/pp));



  if(page>total)page=total;



  var slice=filtered.slice((page-1)*pp,page*pp);



  var tbody=document.getElementById('tbody');



  var empty=document.getElementById('empty');



  if(!slice.length){tbody.innerHTML='';empty.style.display='block';return;}



  empty.style.display='none';



  tbody.innerHTML=slice.map(function(r){



    var shortId=r.id&&r.id.length>24?r.id.slice(0,24)+'…':r.id||'—';



    var typeLabel=r.payout_type==='referral'?'<span class="b-wallet">Referral</span>':'<span class="b-wallet">Main</span>';



    return '<tr>'



      +'<td><div style="display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:12px;color:#7c3aed"><button class="c-copy" onclick="copy(\''+r.id+'\',this)">⧉</button>'+shortId+'</div></td>'



      +'<td>'+typeLabel+'</td>'



      +'<td style="font-weight:700;color:var(--text)">'+fmtAmt(r.amount)+'</td>'



      +'<td>'+statusBadge(r.status)+'</td>'



      +'<td style="white-space:nowrap;font-weight:600">'+fmt(r.created_at)+'</td></tr>';



  }).join('');



  renderPag(total);



}



function renderPag(total){var pg=document.getElementById('pagination');if(total<=1){pg.innerHTML='';return;}var h='<button class="c-pg" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';for(var i=1;i<=total;i++){if(total>7&&i>2&&i<total-1&&Math.abs(i-page)>1){if(i===3||i===total-2)h+='<span class="c-pg" style="cursor:default;opacity:.4">…</span>';continue;}h+='<button class="c-pg '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';}h+='<button class="c-pg" onclick="goPage('+(page+1)+')" '+(page===total?'disabled':'')+'>›</button>';pg.innerHTML=h;}



function goPage(n){var pp=parseInt(document.getElementById('perPage').value);var total=Math.ceil(filtered.length/pp);if(n<1||n>total)return;page=n;renderTable();}



function backToAdmin(){var tok=localStorage.getItem('_admin_token_backup');var usr=localStorage.getItem('_admin_user_backup');if(tok){localStorage.setItem('trendify_access_token',tok);localStorage.setItem('trendify_user',usr||'');}localStorage.removeItem('_from_admin');localStorage.removeItem('_admin_token_backup');localStorage.removeItem('_admin_user_backup');window.location.href='../admin/overview.html';}window.backToAdmin=backToAdmin;function toggleSidebar(){document.getElementById('sidebar').classList.toggle('expanded');}



window.copy=copy;window.goPage=goPage;window.filterTable=filterTable;window.renderTable=renderTable;window.switchTab=switchTab;



initUser();load();



_timer=setInterval(load,30000);



</script>
