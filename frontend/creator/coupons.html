<!-- Create Coupon Modal -->
<div class="c-modal-overlay" id="modal">
  <div class="c-modal" style="max-width:520px;">
    <div class="c-modal-title">Create Coupons</div>
    <div class="c-modal-sub" style="color:#a67cff;margin-bottom:24px;">Create a new coupon for your product.</div>

    <div class="c-field">
      <label class="c-field-label">Coupon Name</label>
      <div class="c-input-wrap"><input class="c-input" id="couponName" placeholder="Enter coupon name"/></div>
    </div>

    <div class="c-field">
      <label class="c-field-label">Select Product</label>
      <select class="c-select" id="couponProduct"><option value="">Select a product...</option></select>
    </div>

    <div class="c-field">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <label class="c-field-label" style="margin-bottom:0;">Coupon Code</label>
        <span style="font-size:12px;color:#9d99bb;" id="codeCount">0/20</span>
      </div>
      <div class="c-input-wrap">
        <input class="c-input" id="couponCode" placeholder="Enter coupon code" maxlength="20" oninput="document.getElementById('codeCount').textContent=this.value.length+'/20'" style="text-transform:uppercase"/>
        <button type="button" onclick="generateCode()" style="background:none;border:none;cursor:pointer;color:#9d99bb;padding:0;display:flex;align-items:center;" title="Generate random code">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 8a6 6 0 0 1 10.5-4M14 8a6 6 0 0 1-10.5 4"/><path d="M11 4h3V1M5 12H2v3"/></svg>
        </button>
      </div>
    </div>

    <div class="c-field">
      <label class="c-field-label">Status</label>
      <select class="c-select" id="couponStatus">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <div class="c-field">
      <label class="c-field-label">Discount Type</label>
      <select class="c-select" id="couponType" onchange="toggleDiscountType()">
        <option value="fixed">Fixed</option>
        <option value="percent">Percentage</option>
      </select>
    </div>

    <div class="c-field" id="discountValueField">
      <label class="c-field-label">Discount Value</label>
      <div class="c-input-wrap"><input class="c-input" id="couponValue" type="number" min="0" placeholder="0"/></div>
    </div>

    <div class="c-field">
      <label class="c-checkbox-row" style="gap:10px;cursor:pointer;">
        <div style="position:relative;width:36px;height:20px;flex-shrink:0;">
          <input type="checkbox" id="limitedToggle" onchange="toggleLimited()" style="opacity:0;width:100%;height:100%;position:absolute;top:0;left:0;cursor:pointer;margin:0;"/>
          <div id="toggleTrack" style="position:absolute;inset:0;background:rgba(167,124,255,.2);border-radius:20px;transition:background .2s;"></div>
          <div id="toggleThumb" style="position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#9d99bb;transition:transform .2s,background .2s;"></div>
        </div>
        <span style="font-size:13px;color:#c8c4e8;">Give limited coupons</span>
      </label>
    </div>

    <div id="limitedSection" style="display:none;">
      <div class="c-field">
        <label class="c-field-label">Usage Limit</label>
        <div class="c-input-wrap"><input class="c-input" id="couponLimit" type="number" min="1" placeholder="e.g. 100"/></div>
      </div>
    </div>

    <div style="border:1px solid rgba(167,124,255,.15);border-radius:8px;padding:16px;margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;color:#a67cff;margin-bottom:14px;">Coupon Validity</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label class="c-field-label" style="font-size:12px;">Valid From</label>
          <div class="c-input-wrap" style="padding:8px 12px;"><input class="c-input" id="validFrom" type="date"/></div>
        </div>
        <div>
          <label class="c-field-label" style="font-size:12px;">Valid Until</label>
          <div class="c-input-wrap" style="padding:8px 12px;"><input class="c-input" id="validUntil" type="date"/></div>
        </div>
      </div>
    </div>

    <div class="c-error" id="couponErr"></div>
    <div class="c-modal-footer">
      <button class="c-btn-primary" onclick="saveCoupon()">+ Add Coupon</button>
      <button style="background:#dc2626;border:none;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:8px 18px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;" onclick="closeModal()">✕ Close</button>
    </div>
  </div>
</div>

<script src="creator-api.js"></script>
<script>
var all=[],filtered=[],page=1,products=[];
function initUser(){var u=null;try{u=JSON.parse(localStorage.getItem('trendify_user'));}catch(e){}if(!u)return;var ini=(u.name||'CR').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);document.getElementById('sbAv').textContent=ini;document.getElementById('sbName').textContent=u.name||'Creator';var idDisplay=(u.email&&u.email.trim())||(u.username&&u.username.trim())||u.id||u._id||'';document.getElementById('sbEmail').textContent=idDisplay;if(u.role==='admin')document.getElementById('backBtn').style.display='inline-flex';}
async function load(){
  products=await CreatorAPI.getProducts();
  var sel=document.getElementById('couponProduct');
  products.forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o);});
  all=[];filtered=[];renderTable();
}
function filterTable(){var q=document.getElementById('searchInput').value.trim().toLowerCase();filtered=q?all.filter(function(r){return (r.code||'').toLowerCase().includes(q)||(r.name||'').toLowerCase().includes(q);}):all.slice();page=1;renderTable();}
function renderTable(){
  var empty=document.getElementById('empty');
  var tbody=document.getElementById('tbody');
  if(!filtered.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=filtered.map(function(r){
    var statusBadge=r.status==='active'?'<span class="b-success">Active</span>':'<span class="b-pending">Inactive</span>';
    return '<tr><td style="font-family:var(--f-mono,monospace);font-weight:700;color:#a67cff">'+r.code+'</td><td>'+r.type+'</td><td>'+(r.product||'All')+'</td><td>'+r.used+'</td><td><button class="c-btn-primary" style="padding:5px 12px;font-size:12px" onclick="editCoupon('+filtered.indexOf(r)+')">Edit</button></td></tr>';
  }).join('');
  document.getElementById('pagination').innerHTML='';
}
function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('couponErr').textContent='';
  document.getElementById('couponName').value='';
  document.getElementById('couponCode').value='';
  document.getElementById('couponValue').value='';
  document.getElementById('codeCount').textContent='0/20';
  document.getElementById('limitedToggle').checked=false;
  document.getElementById('limitedSection').style.display='none';
  document.getElementById('toggleTrack').style.background='rgba(167,124,255,.2)';
  document.getElementById('toggleThumb').style.transform='translateX(0)';
  document.getElementById('toggleThumb').style.background='#9d99bb';
  document.getElementById('validFrom').value='';
  document.getElementById('validUntil').value='';
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function generateCode(){
  var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var code='';
  for(var i=0;i<8;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('couponCode').value=code;
  document.getElementById('codeCount').textContent=code.length+'/20';
}
function toggleLimited(){
  var checked=document.getElementById('limitedToggle').checked;
  document.getElementById('limitedSection').style.display=checked?'block':'none';
  document.getElementById('toggleTrack').style.background=checked?'#a67cff':'rgba(167,124,255,.2)';
  document.getElementById('toggleThumb').style.transform=checked?'translateX(16px)':'translateX(0)';
  document.getElementById('toggleThumb').style.background=checked?'#fff':'#9d99bb';
}
function toggleDiscountType(){}
function editCoupon(idx){}
function saveCoupon(){
  var name=document.getElementById('couponName').value.trim();
  var code=document.getElementById('couponCode').value.trim().toUpperCase();
  var type=document.getElementById('couponType').value;
  var val=document.getElementById('couponValue').value;
  var status=document.getElementById('couponStatus').value;
  var prod=document.getElementById('couponProduct');
  var err=document.getElementById('couponErr');
  err.textContent='';
  if(!name){err.textContent='Coupon name is required.';return;}
  if(!code){err.textContent='Coupon code is required.';return;}
  if(!val||isNaN(parseFloat(val))){err.textContent='Enter a valid discount value.';return;}
  all.unshift({name:name,code:code,type:type==='percent'?'Percentage':'Fixed',product:prod.options[prod.selectedIndex].text,used:0,status:status});
  filtered=[...all];renderTable();closeModal();
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('expanded');}
function toggleTheme(){document.body.classList.toggle('dark');}
window.openModal=openModal;window.closeModal=closeModal;window.saveCoupon=saveCoupon;window.filterTable=filterTable;window.renderTable=renderTable;window.generateCode=generateCode;window.toggleLimited=toggleLimited;window.toggleDiscountType=toggleDiscountType;window.editCoupon=editCoupon;
initUser();load();
</script>
