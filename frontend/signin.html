<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — Trendify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  /* ── SIGN-IN PAGE ── */
  .si-page{
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    padding:100px var(--pad-x) 60px;position:relative;overflow:hidden;
  }

  /* ambient orbs */
  .si-orb1{
    position:absolute;width:800px;height:800px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(123,94,167,.18) 0%,transparent 65%);
    top:-200px;left:-200px;filter:blur(60px);
    animation:hb1 14s ease-in-out infinite alternate;
  }
  .si-orb2{
    position:absolute;width:600px;height:600px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(0,229,200,.1) 0%,transparent 65%);
    bottom:-100px;right:-100px;filter:blur(60px);
    animation:hb2 16s ease-in-out infinite alternate;
  }

  /* card */
  .si-card{
    position:relative;z-index:2;
    width:100%;max-width:460px;
    background:var(--panel);
    border:1px solid rgba(167,124,255,.18);
    border-radius:16px;
    padding:52px 48px;
    box-shadow:0 0 0 1px rgba(167,124,255,.06),0 60px 120px rgba(0,0,0,.7),0 0 80px rgba(123,94,167,.12);
  }
  /* top accent line */
  .si-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:16px 16px 0 0;
    background:linear-gradient(90deg,transparent,var(--violet),var(--aqua),transparent);
  }

  .si-logo{
    font-family:var(--f-sans);font-size:20px;font-weight:800;letter-spacing:.01em;
    background:linear-gradient(135deg,#fff 20%,var(--violet));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    text-decoration:none;display:block;margin-bottom:36px;
  }

  .si-heading{
    font-family:var(--f-serif);font-weight:300;font-size:36px;
    line-height:.95;letter-spacing:-.02em;color:#fff;margin-bottom:8px;
  }
  .si-heading em{font-style:italic;}
  .si-sub{font-size:13px;color:var(--smoke);margin-bottom:40px;line-height:1.6;}
  .si-sub a{color:var(--violet);text-decoration:none;transition:color .2s;}
  .si-sub a:hover{color:#fff;}

  /* form */
  .si-form{display:flex;flex-direction:column;gap:18px;}

  .si-field{display:flex;flex-direction:column;gap:7px;}
  .si-label{
    font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--smoke);
  }
  .si-input{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(167,124,255,.18);
    border-radius:6px;padding:13px 16px;
    font-family:var(--f-sans);font-size:14px;color:#fff;
    outline:none;transition:border-color .25s,box-shadow .25s;
    cursor:text;
  }
  .si-input::placeholder{color:var(--mist);}
  .si-input:focus{
    border-color:rgba(167,124,255,.5);
    box-shadow:0 0 0 3px rgba(123,94,167,.12);
  }

  .si-row{display:flex;justify-content:space-between;align-items:center;}
  .si-check-label{
    display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--smoke);cursor:pointer;
  }
  .si-check{
    width:14px;height:14px;border-radius:3px;
    border:1px solid rgba(167,124,255,.3);background:transparent;
    accent-color:var(--violet);cursor:pointer;
  }
  .si-forgot{
    font-family:var(--f-mono);font-size:10px;letter-spacing:.06em;
    color:var(--smoke);text-decoration:none;transition:color .2s;
  }
  .si-forgot:hover{color:var(--violet);}

  .si-btn{
    margin-top:6px;width:100%;padding:15px;border-radius:6px;
    font-family:var(--f-sans);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#fff;background:var(--iris);border:1px solid transparent;
    cursor:pointer;transition:background .25s,box-shadow .25s,transform .2s;
    box-shadow:0 0 36px rgba(123,94,167,.4);position:relative;overflow:hidden;
  }
  .si-btn::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
    opacity:0;transition:opacity .25s;
  }
  .si-btn:hover{background:var(--violet);box-shadow:0 0 60px rgba(167,124,255,.55);transform:translateY(-1px);}
  .si-btn:hover::before{opacity:1;}

  /* divider */
  .si-divider{
    display:flex;align-items:center;gap:14px;
    font-family:var(--f-mono);font-size:9px;letter-spacing:.12em;color:var(--mist);
    text-transform:uppercase;margin:4px 0;
  }
  .si-divider::before,.si-divider::after{
    content:'';flex:1;height:1px;background:var(--rim);
  }

  /* social buttons */
  .si-socials{display:flex;flex-direction:column;gap:10px;}
  .si-social-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:12px;border-radius:6px;
    border:1px solid rgba(167,124,255,.18);background:rgba(255,255,255,.03);
    font-family:var(--f-sans);font-size:12px;font-weight:700;letter-spacing:.04em;
    color:var(--smoke);text-decoration:none;cursor:pointer;
    transition:border-color .25s,color .25s,background .25s;
  }
  .si-social-btn:hover{border-color:rgba(167,124,255,.4);color:#fff;background:rgba(255,255,255,.06);}
  .si-social-icon{width:16px;height:16px;flex-shrink:0;}

  .si-signup{
    text-align:center;margin-top:28px;
    font-size:12px;color:var(--smoke);
  }
  .si-signup a{color:var(--violet);text-decoration:none;font-weight:700;transition:color .2s;}
  .si-signup a:hover{color:#fff;}

  /* role toggle */
  .si-role-toggle{
    display:flex;gap:0;margin-bottom:28px;
    border:1px solid rgba(167,124,255,.2);border-radius:8px;overflow:hidden;
  }
  .si-role-btn{
    flex:1;padding:10px;background:transparent;border:none;
    font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--smoke);cursor:pointer;transition:background .2s,color .2s;
  }
  .si-role-btn.active{
    background:rgba(167,124,255,.18);color:#fff;
  }
  .si-role-btn:first-child{ border-right:1px solid rgba(167,124,255,.2); }

  @media(max-width:520px){
    .si-card{padding:36px 20px;margin:0 16px;border-radius:12px}
    .si-heading{font-size:26px}
    .si-page{padding:80px 16px 40px}
  }

  /* ── LAMP ── */
  .lamp-scene{
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;
    background:#04040f;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    transition:opacity .7s ease;
  }
  .lamp-scene.hidden{opacity:0;pointer-events:none;}
  .lamp-hint{
    position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);
    font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(167,124,255,.4);pointer-events:none;
    animation:hint-pulse 2.5s ease-in-out infinite;
  }
  @keyframes hint-pulse{0%,100%{opacity:.3}50%{opacity:.7}}
  .lamp-wrapper{
    transform-origin:top center;
    animation:lamp-idle 4s ease-in-out infinite;
    cursor:pointer;margin-top:0;
  }
  .lamp-wrapper.swing{animation:lamp-swing .8s cubic-bezier(.36,.07,.19,.97) forwards;}
  @keyframes lamp-idle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @keyframes lamp-swing{
    0%{transform:rotate(0)}
    20%{transform:rotate(20deg)}
    40%{transform:rotate(-15deg)}
    60%{transform:rotate(10deg)}
    80%{transform:rotate(-5deg)}
    100%{transform:rotate(0)}
  }
  .lamp-cord{
    width:2px;height:130px;
    background:linear-gradient(to bottom,rgba(167,124,255,.5),rgba(167,124,255,.1));
    margin:0 auto;
  }
  .lamp-head{
    width:80px;height:52px;
    background:linear-gradient(160deg,#2a1a4a,#1a0f2e);
    border-radius:4px 4px 40px 40px;
    margin:0 auto;position:relative;
    box-shadow:0 0 0 1px rgba(167,124,255,.2);
  }
  .lamp-bulb{
    position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
    width:12px;height:12px;border-radius:50%;
    background:#fff8e0;
    box-shadow:0 0 10px 5px rgba(255,220,80,.5),0 0 30px 15px rgba(255,180,40,.2);
    transition:box-shadow .3s ease;
  }
  .lamp-wrapper.swing .lamp-bulb{
    box-shadow:0 0 20px 10px rgba(255,220,80,.95),0 0 60px 30px rgba(255,180,40,.55),0 0 120px 60px rgba(255,140,20,.25);
  }
  .lamp-cone{
    position:absolute;top:45px;left:50%;transform:translateX(-50%);
    width:0;height:0;
    border-left:130px solid transparent;
    border-right:130px solid transparent;
    border-bottom:220px solid rgba(255,200,60,.06);
    filter:blur(20px);opacity:0;
    transition:opacity .4s ease;pointer-events:none;
  }
  .lamp-wrapper.swing .lamp-cone{opacity:1;}
  .lamp-floor{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:320px;height:60px;
    background:radial-gradient(ellipse,rgba(255,180,40,.1) 0%,transparent 70%);
    pointer-events:none;opacity:0;transition:opacity .4s ease;
  }
  .lamp-scene.lit .lamp-floor{opacity:1;}
</style>
</head>
<body>

<!-- LAMP SCENE -->
<div class="lamp-scene" id="lampScene">
  <div class="lamp-hint" id="lampHint">click the lamp to sign in</div>
  <div class="lamp-wrapper" id="lampWrapper" onclick="triggerLamp()">
    <div class="lamp-cord"></div>
    <div class="lamp-head">
      <div class="lamp-bulb"></div>
      <div class="lamp-cone"></div>
    </div>
  </div>
  <div class="lamp-floor"></div>
</div>

<canvas id="particles"></canvas>
<div id="c"></div>
<div class="cr" id="cr"></div>
<div id="prog"></div>

<!-- NAV -->
<nav id="nav">
  <a href="index.html" class="logo" aria-label="Trendify">
    <img src="assets/logo.jpeg" alt="Trendify logo" class="site-logo"
         onerror="this.style.display='none'"/>
    <span class="logo-text">Trendify</span>
  </a>
  <ul class="nv">
    <li><a href="index.html#overview">Overview</a></li>
    <li><a href="index.html#courses">Courses</a></li>
    <li><a href="index.html#payments">Payments</a></li>
    <li><a href="index.html#pricing">Pricing</a></li>
  </ul>
  <div class="na">
    <a href="signin.html" class="btn-nav-ghost" style="color:var(--white)">Sign in</a>
    <a href="signup.html" class="btn-nav">Start free</a>
  </div>
</nav>

<!-- SIGN IN PAGE -->
<main class="si-page">
  <div class="si-orb1"></div>
  <div class="si-orb2"></div>

  <div class="si-card">
    <a href="index.html" class="si-logo">Trendify</a>

    <div class="si-role-toggle">
      <button type="button" class="si-role-btn active" id="roleAdmin" onclick="setRole('admin')">Admin</button>
      <button type="button" class="si-role-btn" id="roleCreator" onclick="setRole('creator')">Creator</button>
    </div>

    <h1 class="si-heading" id="si-heading">Admin<br/><em>sign in.</em></h1>
    <p class="si-sub">New here? <a href="signup.html">Start your free trial →</a></p>

    <form class="si-form" id="si-form">
      <div class="si-field">
        <label class="si-label" for="email">Email address</label>
        <input class="si-input" id="email" type="email" autocomplete="email"/>
      </div>

      <div class="si-field">
        <label class="si-label" for="password">Password</label>
        <div style="position:relative;">
          <input class="si-input" id="password" type="password" autocomplete="current-password" style="width:100%;padding-right:44px;"/>
          <button type="button" id="togglePw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--smoke);transition:color .2s;" onclick="const p=document.getElementById('password');const e=document.getElementById('eyeIcon');if(p.type==='password'){p.type='text';e.innerHTML='<path d=\'M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z\'/><line x1=\'3\' y1=\'3\' x2=\'13\' y2=\'13\'/>'}else{p.type='password';e.innerHTML='<path d=\'M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z\'/><circle cx=\'8\' cy=\'8\' r=\'2\'/>'}">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d='M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5'/><circle cx='8' cy='8' r='2'/></svg>
          </button>
        </div>
      </div>

      <div class="si-row">
        <label class="si-check-label">
          <input class="si-check" type="checkbox"/> Remember me
        </label>
        <a href="#" class="si-forgot">Forgot password?</a>
      </div>

      <button class="si-btn" type="submit" id="si-submit">Sign in as Admin →</button>

      <div class="si-divider">or continue with</div>

      <div class="si-socials">
        <button type="button" class="si-social-btn" id="googleSignInBtn" onclick="handleGoogleSignIn()">
          <!-- Google icon -->
          <svg class="si-social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </form>

    <p class="si-signup">Don't have an account? <a href="signup.html">Create one free</a></p>
  </div>
</main>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<!-- Set API URL for local development -->
<script>
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    window.__API_URL__ = 'http://localhost:8000';
  }
</script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/auth-api.js"></script>
<script>
  gsap.from('.si-card', {opacity:0, y:32, duration:.8, ease:'power3.out', delay:.2});
  gsap.from('.si-heading, .si-sub', {opacity:0, y:16, duration:.6, ease:'power2.out', stagger:.1, delay:.4});

  var currentRole = 'admin';
  var fromAdmin = false;

  // Read URL params
  (function(){
    var params = new URLSearchParams(window.location.search);
    var roleParam = params.get('role');
    var fromParam = params.get('from');
    if(fromParam === 'admin') {
      fromAdmin = true;
      // Save admin token before creator signs in
      var adminToken = localStorage.getItem('trendify_access_token');
      var adminUser = localStorage.getItem('trendify_user');
      if(adminToken) localStorage.setItem('_admin_token_backup', adminToken);
      if(adminUser) localStorage.setItem('_admin_user_backup', adminUser);
      // Show back to admin banner
      var banner = document.createElement('div');
      banner.id = 'adminBanner';
      banner.innerHTML = '<span style="font-size:13px;color:#9d99bb;">Signing in as Creator on behalf of Admin</span><button onclick="restoreAdmin()" style="background:rgba(167,124,255,.2);border:1px solid rgba(167,124,255,.3);color:#a67cff;font-size:12px;font-weight:700;padding:5px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;">&#8592; Back to Admin</button>';
      banner.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(167,124,255,.08);border:1px solid rgba(167,124,255,.2);border-radius:8px;padding:10px 16px;margin-bottom:20px;';
      document.querySelector('.si-card').insertBefore(banner, document.querySelector('.si-card').firstChild);
    }
    if(roleParam === 'creator') setRole('creator');
    else if(roleParam === 'admin') setRole('admin');
  })();

  function restoreAdmin(){
    var tok = localStorage.getItem('_admin_token_backup');
    var usr = localStorage.getItem('_admin_user_backup');
    if(tok) localStorage.setItem('trendify_access_token', tok);
    if(usr) localStorage.setItem('trendify_user', usr);
    localStorage.removeItem('_admin_token_backup');
    localStorage.removeItem('_admin_user_backup');
    window.location.href = 'admin/overview.html';
  }
  window.restoreAdmin = restoreAdmin;

  function setRole(role) {
    currentRole = role;
    document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
    document.getElementById('roleCreator').classList.toggle('active', role === 'creator');
    document.getElementById('si-heading').innerHTML = role === 'admin' ? 'Admin<br/><em>sign in.</em>' : 'Creator<br/><em>sign in.</em>';
    document.getElementById('si-submit').textContent = role === 'admin' ? 'Sign in as Admin \u2192' : 'Sign in as Creator \u2192';
  }

  document.getElementById('si-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = this.querySelector('.si-btn');

    if (!email || !password) {
      btn.textContent = 'Fill in all fields';
      btn.style.background = 'var(--ember)';
      setTimeout(() => { btn.textContent = currentRole === 'admin' ? 'Sign in as Admin \u2192' : 'Sign in as Creator \u2192'; btn.style.background = ''; }, 2000);
      return;
    }

    btn.textContent = 'Signing in\u2026';
    btn.disabled = true;

    try {
      const user = await TrendifyAuth.login(email, password);
      if (user.role !== currentRole) {
        TrendifyAuth.logout();
        // Restore admin token if we were coming from admin
        if(fromAdmin){
          var tok = localStorage.getItem('_admin_token_backup');
          var usr = localStorage.getItem('_admin_user_backup');
          if(tok) localStorage.setItem('trendify_access_token', tok);
          if(usr) localStorage.setItem('trendify_user', usr);
        }
        throw new Error('This account is not a ' + currentRole);
      }
      // Store from=admin flag so creator dashboard knows to show Back to Admin
      if(fromAdmin) localStorage.setItem('_from_admin', '1');
      else localStorage.removeItem('_from_admin');
      btn.textContent = '\u2713 Welcome back';
      btn.style.background = 'var(--green)';
      setTimeout(() => { TrendifyAuth.redirectByRole(user); }, 600);
    } catch (err) {
      btn.textContent = err.message || 'Login failed';
      btn.style.background = 'var(--ember)';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = currentRole === 'admin' ? 'Sign in as Admin \u2192' : 'Sign in as Creator \u2192'; btn.style.background = ''; }, 3000);
    }
  });
</script>
<script>
  const GOOGLE_CLIENT_ID = '644237547029-c8humgt5p4qplv91rjfs2f3nc7dd9vvo.apps.googleusercontent.com';

  function handleGoogleSignIn() {
    const btn = document.getElementById('googleSignInBtn');
    btn.textContent = 'Opening Google…';
    btn.disabled = true;
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: async (response) => {
        try {
          const user = await TrendifyAuth.googleSignIn(response.credential);
          if (currentRole !== 'admin' && user.role === 'admin') {
            TrendifyAuth.logout();
            throw new Error('This account is not a ' + currentRole);
          }
          btn.textContent = '✓ Welcome back';
          setTimeout(() => { TrendifyAuth.redirectByRole(user); }, 600);
        } catch (err) {
          btn.innerHTML = '<svg class="si-social-icon" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> ' + (err.message || 'Google sign-in failed');
          btn.disabled = false;

<script>
  function triggerLamp() {
    var wrapper = document.getElementById('lampWrapper');
    var scene = document.getElementById('lampScene');
    var hint = document.getElementById('lampHint');
    hint.style.display = 'none';
    wrapper.classList.remove('swing');
    void wrapper.offsetWidth; // reflow to restart animation
    wrapper.classList.add('swing');
    scene.classList.add('lit');
    setTimeout(function() {
      scene.classList.add('hidden');
    }, 800);
  }
  window.triggerLamp = triggerLamp;
</script>
