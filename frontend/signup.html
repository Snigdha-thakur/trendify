<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create Account — Trendify</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;overflow:hidden;min-height:100vh;color:#f5f2ff;}

.scene{
  position:fixed;inset:0;
  background:#0e0818;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(40px,6vw,100px);
  padding:20px;
  transition:background 1s ease;
  overflow-y:auto;
}
.scene::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 25% 18%,rgba(220,180,255,.14) 0%,transparent 24%),
              radial-gradient(circle at 80% 30%,rgba(100,210,255,.12) 0%,transparent 20%);
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
.scene.lit{background:radial-gradient(circle at 50% 15%,rgba(130,90,255,.08),transparent 30%),#10071a;}
.scene.lit::before{opacity:.92;}
@keyframes bg-pulse{0%,100%{background:#0f0a1a;}50%{background:#140e26;}}
@keyframes orb-float{0%,100%{transform:translate(0,0) scale(1);opacity:.18;}33%{transform:translate(20px,-15px) scale(1.1);opacity:.25;}66%{transform:translate(-15px,10px) scale(.95);opacity:.15;}}
.scene.lit{animation:bg-pulse 4s ease-in-out infinite;}

#starCanvas{position:absolute;inset:0;pointer-events:none;opacity:1;transition:opacity .8s ease;z-index:0;}
.scene.lit #starCanvas{opacity:0;}

.bg-orb{position:absolute;border-radius:50%;pointer-events:none;opacity:0;transition:opacity 1s ease;}
.bg-orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(100,60,220,.18) 0%,transparent 65%);top:-100px;left:-100px;animation:orb-float 8s ease-in-out infinite;}
.bg-orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(80,40,200,.14) 0%,transparent 65%);bottom:-80px;right:-80px;animation:orb-float 10s ease-in-out infinite reverse;}
.bg-orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(120,80,255,.1) 0%,transparent 65%);top:10%;right:10%;animation:orb-float 6s ease-in-out infinite 2s;}
.scene.lit .bg-orb{opacity:.25;}

@keyframes flicker{0%,100%{opacity:.55;}20%{opacity:.6;}40%{opacity:.45;}60%{opacity:.58;}80%{opacity:.5;}}
.wall-light{position:absolute;left:0;top:0;bottom:0;width:45%;background:radial-gradient(ellipse at 30% 40%,rgba(100,70,220,.12) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .8s ease;}
.scene.lit .wall-light{opacity:1;animation:flicker 3s ease-in-out infinite;}

/* lamp */
.lamp-wrap{flex-shrink:0;width:clamp(180px,24vw,280px);min-height:clamp(420px,72vh,560px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:16px;}
.lamp-instruction{color:rgba(235,225,255,.9);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;text-align:center;text-shadow:0 0 10px rgba(160,120,255,.18);}
.lamp-wrap svg{width:100%;height:100%;overflow:visible;}
#cone,#cone2{transition:fill .8s ease;}
#floorGlow{transition:fill .8s ease;}
#bulbGlow{transition:opacity .8s ease;}
#rimGlow{transition:fill .8s ease;}
#switchKnob{transition:fill .3s ease;}
/* switch dialog styling */
.switch-bubble-rect{fill:rgba(30,18,40,.6);stroke:rgba(190,150,255,.18);}
.switch-bubble-text{fill:rgba(250,244,255,.95);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;}
.switch-bubble-tail{fill:rgba(110,60,160,.14);stroke:rgba(190,150,255,.18);}

/* card slider */
.card-slider{width:clamp(480px,58vw,680px);flex-shrink:0;perspective:1200px;opacity:0;transform:translateY(20px);transition:opacity .8s ease .2s,transform .8s ease .2s;pointer-events:none;}
.scene.lit .card-slider{opacity:1;transform:translateY(0);pointer-events:auto;}
.card-slider-track{width:100%;position:relative;height:clamp(480px,72vh,600px);transform-style:preserve-3d;transition:transform .8s cubic-bezier(.77,0,.18,1);}
.card-panel{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;}

/* card wrap */
.card-wrap{width:100%;flex-shrink:0;opacity:0;transform:translateY(16px);transition:opacity .7s ease .1s,transform .7s ease .1s,box-shadow .8s ease;pointer-events:none;display:flex;flex-direction:column;border-radius:20px;}
.scene.lit .card-wrap{opacity:1;transform:translateY(0);pointer-events:auto;}

/* flip card */
.flip-card{width:100%;height:100%;display:flex;flex-direction:row;background:linear-gradient(180deg,rgba(22,12,50,.96),rgba(12,6,30,.92));border:1px solid rgba(167,124,255,.35);border-radius:20px;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.85), 0 0 0 1px rgba(70,40,140,.1);}
.flip-form{flex:1;padding:20px 28px;display:flex;flex-direction:column;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative;z-index:1;border-radius:20px;}
.flip-form::-webkit-scrollbar{display:none;}

/* inputs */
.card-btn{width:100%;padding:9px;border-radius:10px;font-size:12px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#9c5cff,#6d28d9);border:1px solid rgba(255,255,255,.14);cursor:pointer;box-shadow:0 10px 24px rgba(124,58,237,.32);transition:background .2s,transform .15s,box-shadow .2s;margin-bottom:8px;}
.card-btn:hover{background:linear-gradient(135deg,#b77dff,#8b5cf6);transform:translateY(-1px);}
.card-divider{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.1em;color:rgba(210,190,255,.75);text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace;}
.card-divider::before,.card-divider::after{content:'';flex:1;height:1px;background:rgba(60,40,120,.2);}
.card-google{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border-radius:8px;border:1px solid rgba(100,70,210,.32);background:rgba(255,255,255,.05);font-size:12px;font-weight:700;color:rgba(245,240,255,.95);cursor:pointer;transition:border-color .2s,color .2s,background .2s;}
.card-google:hover{border-color:rgba(110,70,240,.4);color:#b8a8e0;}

.su-field{display:flex;flex-direction:column;gap:2px;margin-bottom:5px;}
.su-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(200,180,255,.6);}
.su-input{width:100%;background:#11081f;border:1px solid rgba(100,70,210,.30);border-radius:8px;padding:8px 12px;font-size:12px;color:#f6f2ff;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Syne',sans-serif;}
.su-input::placeholder{color:rgba(220,210,255,.5);}
.su-input:focus{border-color:rgba(110,70,240,.8);box-shadow:0 0 0 2px rgba(120,80,220,.2);}
.su-phone-wrap{display:flex;}
.su-phone-prefix{background:rgba(255,255,255,.04);border:1px solid rgba(100,70,210,.30);border-right:none;border-radius:8px 0 0 8px;padding:8px 8px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(200,180,255,.7);white-space:nowrap;}
.su-phone-wrap .su-input{border-radius:0 8px 8px 0;}
.su-str-bars{display:flex;gap:3px;margin-top:5px;}
.su-str-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .3s;}
.su-str-bar.w{background:#ef4444;}
.su-str-bar.m{background:#f59e0b;}
.su-str-bar.s{background:#22c55e;}
.su-str-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(180,160,255,.6);margin-top:3px;}
.su-terms-row{display:flex;align-items:flex-start;gap:6px;font-size:10px;color:rgba(220,210,255,.75);line-height:1.4;margin-bottom:6px;}
.su-terms-row input{accent-color:#9d7cff;width:13px;height:13px;flex-shrink:0;margin-top:2px;}
.su-terms-row a{color:#a78bfa;text-decoration:none;}

/* mobile */
@media(max-width:600px){
  .scene{flex-direction:row;gap:8px;padding:10px;justify-content:center;align-items:center;height:100svh;overflow:hidden;}
  .lamp-wrap{width:110px;min-width:110px;flex-shrink:0;height:60vh;gap:4px;}
  .lamp-wrap svg{width:100%;height:100%;}
  .lamp-instruction{font-size:7px;letter-spacing:.06em;word-break:break-word;text-align:center;line-height:1.3;}
  .switch-bubble-text{font-size:16px!important;letter-spacing:.05em!important;}
  .card-slider{flex:1;min-width:0;}
  .card-slider-track{height:75vh;}
  .card-panel{position:absolute;inset:0;align-items:center;justify-content:center;}
  .card-wrap{height:auto!important;width:100%;}
  .flip-card{border-radius:12px;height:auto!important;max-height:72vh;overflow-y:auto;border:1px solid rgba(167,124,255,.35);}
  .flip-form{padding:14px 10px !important;justify-content:flex-start!important;}
}
@media(min-width:601px) and (max-width:860px){
  .scene{gap:24px;}
  .lamp-wrap{width:120px;height:300px;}
  .card-slider{width:clamp(300px,50vw,480px);}
  .card-slider-track{height:clamp(420px,65vh,560px);}
}
</style>
</head>

<script>
  /* stars */
  (function(){
    var cv=document.getElementById('starCanvas'),ctx=cv.getContext('2d'),stars=[],shoots=[],W,H;
    function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    for(var i=0;i<160;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*.9+.2,a:Math.random(),da:(Math.random()*.004+.001)*(Math.random()<.5?1:-1)});
    setInterval(function(){shoots.push({x:Math.random()*W*.8,y:Math.random()*H*.3,len:Math.random()*120+60,speed:Math.random()*6+5,angle:Math.PI/5,alpha:1});},1800);
    function draw(){
      ctx.clearRect(0,0,W,H);
      for(var i=0;i<stars.length;i++){var s=stars[i];s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle='rgba(220,210,255,'+s.a.toFixed(2)+')';ctx.fill();}
      for(var j=shoots.length-1;j>=0;j--){var sh=shoots[j],ex=sh.x+Math.cos(sh.angle)*sh.len,ey=sh.y+Math.sin(sh.angle)*sh.len,g=ctx.createLinearGradient(sh.x,sh.y,ex,ey);g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(1,'rgba(200,180,255,'+sh.alpha.toFixed(2)+')');ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(ex,ey);ctx.strokeStyle=g;ctx.lineWidth=1.2;ctx.stroke();sh.x+=Math.cos(sh.angle)*sh.speed;sh.y+=Math.sin(sh.angle)*sh.speed;sh.alpha-=.018;if(sh.alpha<=0)shoots.splice(j,1);}
      requestAnimationFrame(draw);
    }
    draw();
  })();

  var isLit=false;
  function toggleLamp(){
    isLit=!isLit;
    document.getElementById('scene').classList.toggle('lit',isLit);
    document.getElementById('cone').setAttribute('fill',isLit?'rgba(120,80,255,0.10)':'rgba(120,80,255,0)');
    document.getElementById('cone2').setAttribute('fill',isLit?'rgba(160,120,255,0.06)':'rgba(160,120,255,0)');
    document.getElementById('floorGlow').setAttribute('fill',isLit?'rgba(130,90,255,0.32)':'rgba(130,90,255,0)');
    document.getElementById('bulbGlow').setAttribute('opacity',isLit?'0.55':'0');
    document.getElementById('rimGlow').setAttribute('fill',isLit?'rgba(180,130,255,0.35)':'rgba(160,110,255,0)');
    document.getElementById('switchBase').setAttribute('fill',isLit?'#3f236c':'#22144a');
    document.getElementById('switchBase').setAttribute('stroke',isLit?'rgba(255,255,255,.45)':'rgba(170,130,255,.4)');
    document.getElementById('switchKnob').setAttribute('fill',isLit?'#9060e0':'#3a1860');
    document.getElementById('switchKnob').style.transform=isLit?'translateY(-6px)':'translateY(0)';
    var fc=document.querySelector('.flip-card');
    if(fc)fc.style.boxShadow=isLit?'0 20px 90px rgba(124,58,237,.7),0 0 0 1px rgba(120,80,220,.2)':'0 16px 60px rgba(0,0,0,.85),0 0 0 1px rgba(70,40,140,.1)';
  }
  window.toggleLamp=toggleLamp;

  /* password strength */
  document.getElementById('su-password').addEventListener('input',function(){
    var v=this.value,score=0;
    if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^A-Za-z0-9]/.test(v))score++;
    var cls=score<=1?'w':score===2?'m':'s';
    ['sb1','sb2','sb3','sb4'].forEach(function(id,i){document.getElementById(id).className='su-str-bar'+(i<score?' '+cls:'');});
    var lbl=document.getElementById('str-label');
    lbl.textContent=v.length?['','Weak','Fair','Good','Strong'][score]:'';
    lbl.style.color=score<=1?'#ef4444':score===2?'#f59e0b':'#22c55e';
  });

  async function handleSignup(e){
    e.preventDefault();
    var fullname=document.getElementById('fullname').value.trim();
    var email=document.getElementById('su-email').value.trim();
    var phone=document.getElementById('phone').value.trim();
    var password=document.getElementById('su-password').value;
    var terms=document.getElementById('su-terms').checked;
    var btn=document.getElementById('su-btn');
    if(!fullname||!email||!phone||!password){btn.textContent='Fill all fields';btn.style.background='#dc2626';setTimeout(function(){btn.textContent='Create account →';btn.style.background='';},2000);return;}
    if(phone.length<10){btn.textContent='Valid phone required';btn.style.background='#dc2626';setTimeout(function(){btn.textContent='Create account →';btn.style.background='';},2000);return;}
    if(password.length<8){btn.textContent='Password too short';btn.style.background='#dc2626';setTimeout(function(){btn.textContent='Create account →';btn.style.background='';},2000);return;}
    if(!terms){btn.textContent='Accept terms first';btn.style.background='#dc2626';setTimeout(function(){btn.textContent='Create account →';btn.style.background='';},2000);return;}
    btn.textContent='Creating…';btn.disabled=true;
    try{
      var role=document.querySelector('input[name="role"]:checked').value||'user';
      var urlParams=new URLSearchParams(window.location.search);
      var referralCode=urlParams.get('referral')||urlParams.get('referral_code')||'';
      var apiBase=(window.__API_URL__||'')+'/api/auth';
      var payload={email,password,name:fullname,phone,role};
      if(referralCode)payload.referral_code=referralCode;
      var res=await fetch(apiBase+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      var data=await res.json();
      if(!res.ok)throw new Error(data.detail||'Registration failed');
      localStorage.setItem('trendify_access_token',data.access_token);
      localStorage.setItem('trendify_user',JSON.stringify(data.user));
      btn.textContent='✓ Account created!';btn.style.background='#16a34a';
      setTimeout(function(){
        var r=(data.user&&data.user.role)||'user';
        if(r==='admin')location.href='admin/overview.html';
        else if(r==='creator')location.href='creator/dashboard.html';
        else location.href='index.html';
      },700);
    }catch(err){
      btn.textContent=err.message||'Registration failed';btn.style.background='#dc2626';btn.disabled=false;
      setTimeout(function(){btn.textContent='Create account →';btn.style.background='';},3000);
    }
  }
  window.handleSignup=handleSignup;

  var GOOGLE_CLIENT_ID='644237547029-c8humgt5p4qplv91rjfs2f3nc7dd9vvo.apps.googleusercontent.com';
  function handleGoogleSignUp(){
    if (typeof google === 'undefined' || !google.accounts) {
      alert('Google Sign-In is not available. Please check your internet connection.');
      return;
    }
    var btn=document.getElementById('googleSignUpBtn');
    btn.textContent='Opening Google\u2026';btn.disabled=true;
    google.accounts.id.initialize({
      client_id:GOOGLE_CLIENT_ID,
      ux_mode:'popup',
      callback:async function(r){
        try{
          var res=await fetch((window.__API_URL__||'')+'/api/auth/google',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id_token:r.credential})});
          var data=await res.json();
          if(!res.ok)throw new Error(data.detail||'Google sign-in failed');
          localStorage.setItem('trendify_access_token',data.access_token);
          localStorage.setItem('trendify_user',JSON.stringify(data.user));
          btn.textContent='\u2713 Signed in!';
          setTimeout(function(){
            var role=(data.user&&data.user.role)||'user';
            if(role==='admin')location.href='admin/overview.html';
            else if(role==='creator')location.href='creator/dashboard.html';
            else location.href='index.html';
          },600);
        }catch(e){
          btn.textContent=e.message||'Failed';btn.style.color='#ef4444';btn.disabled=false;
          setTimeout(function(){btn.textContent='Continue with Google';btn.style.color='';},3000);
        }
      }
    });
    google.accounts.id.prompt(function(notification){
      if(notification.isNotDisplayed()||notification.isSkippedMoment()){
        var tmp=document.createElement('div');
        tmp.style.cssText='position:fixed;opacity:0;pointer-events:none;';
        document.body.appendChild(tmp);
        google.accounts.id.renderButton(tmp,{type:'standard',size:'large'});
        setTimeout(function(){var b=tmp.querySelector('[role=button]');if(b)b.click();},200);
        btn.disabled=false;btn.textContent='Continue with Google';
      }
    });
  }
  window.handleGoogleSignUp=handleGoogleSignUp;


</script>
