<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Payment Successful | Trendify</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040f;color:#f2f0ff;font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(rgba(167,124,255,.05) 1px,transparent 1px);background-size:40px 40px;}
.card{max-width:440px;width:100%;margin:24px;background:#0d0d26;border:1px solid rgba(34,212,122,.2);border-radius:20px;padding:48px 36px;text-align:center;}
.icon-wrap{width:80px;height:80px;border-radius:50%;background:rgba(34,212,122,.1);border:2px solid rgba(34,212,122,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.icon-wrap svg{color:#22d47a;}
.title{font-size:24px;font-weight:800;color:#f2f0ff;margin-bottom:8px;}
.sub{font-size:14px;color:#9d99bb;line-height:1.6;margin-bottom:28px;}
.order-box{background:rgba(34,212,122,.06);border:1px solid rgba(34,212,122,.15);border-radius:10px;padding:14px 18px;margin-bottom:28px;text-align:left;}
.order-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.order-row .label{color:#9d99bb;}
.order-row .val{color:#f2f0ff;font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:8px;background:#a67cff;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;text-decoration:none;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-outline{background:transparent;border:1px solid rgba(167,124,255,.3);color:#a67cff;margin-left:10px;}
.btn-outline:hover{background:rgba(167,124,255,.08);}
.brand{margin-top:32px;font-size:11px;color:#9d99bb;font-family:'DM Mono',monospace;}
.brand span{background:linear-gradient(135deg,#a67cff,#00e5c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;}
</style>
</head>
<body>
<link rel="stylesheet" href="/css/loader.css"/>
<div id="tfy-loader"><div class="tfy-ring"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><span class="tfy-label">Please wait...</span></div>
<script src="/js/tfy-loader-api.js"></script>
<div class="card">
  <div class="icon-wrap">
    <svg width="36" height="36" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 8l4 4 8-8"/></svg>
  </div>
  <div class="title">Payment Successful!</div>
  <div class="sub">Your payment has been processed successfully. You'll receive a confirmation on your email shortly.</div>

  <div class="order-box" id="orderBox" style="display:none;">
    <div class="order-row"><span class="label">Order ID</span><span class="val" id="orderId">—</span></div>
    <div class="order-row"><span class="label">Amount</span><span class="val" id="orderAmt">—</span></div>
    <div class="order-row"><span class="label">Product</span><span class="val" id="orderProduct">—</span></div>
  </div>

  <div>
    <a class="btn" id="backBtn" href="/">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      Continue
    </a>
  </div>
  <div class="brand">Powered by <span>Trendify</span></div>
</div>

<script>
var params=new URLSearchParams(location.search);
var orderId=params.get('order_id');
var amount=params.get('amount');
var productId=params.get('product_id');
var productName=params.get('product_name');

if(orderId||amount||productName){
  document.getElementById('orderBox').style.display='block';
  if(orderId)document.getElementById('orderId').textContent=orderId;
  if(amount)document.getElementById('orderAmt').textContent='₹'+parseFloat(amount).toLocaleString('en-IN');
  if(productName)document.getElementById('orderProduct').textContent=decodeURIComponent(productName);
}

if(productId){
  document.getElementById('backBtn').href='/product-preview.html?id='+encodeURIComponent(productId);
}
</script>
</body>
</html>
