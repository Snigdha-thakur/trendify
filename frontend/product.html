<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Product Checkout | Trendify</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040f;color:#f2f0ff;font-family:'Syne',sans-serif;min-height:100vh;background-image:radial-gradient(rgba(167,124,255,.05) 1px,transparent 1px);background-size:40px 40px;background-attachment:fixed;}

/* ── BLURRED PRODUCT PEEK (top) — clickable to close sheet ── */
.product-peek{position:relative;padding:16px 16px 0;filter:blur(1.5px);user-select:none;opacity:.55;cursor:pointer;}
.product-peek:hover{opacity:.65;}
.peek-sec-head{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;font-weight:700;color:#f2f0ff;}
.peek-bar{width:28px;height:3px;border-radius:2px;background:#d4a843;flex-shrink:0;}
.peek-block{background:rgba(255,255,255,.03);border:1px solid rgba(167,124,255,.08);border-radius:8px;padding:10px 14px;font-size:13px;color:#c8c4e8;margin-top:4px;}

/* ── BOTTOM SHEET ── */
.sheet-wrap{background:#0d0d26;border:1px solid rgba(167,124,255,.18);border-radius:20px 20px 0 0;min-height:calc(100vh - 80px);margin-top:16px;padding-bottom:20px;max-width:100%;}
.sheet-handle{width:40px;height:4px;background:rgba(167,124,255,.35);border-radius:2px;margin:12px auto 0;}

/* ── SHEET INNER ── */
.sheet-inner{max-width:520px;margin:0 auto;padding:20px 16px 0;}

.sheet-title{font-size:18px;font-weight:800;color:#f2f0ff;text-align:center;margin-bottom:4px;}
.sheet-sub{font-size:12px;color:#9d99bb;text-align:center;margin-bottom:20px;}

/* ── FORM FIELDS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:#c8c4e8;margin-bottom:6px;}
.input-wrap{display:flex;align-items:center;border:1px solid rgba(167,124,255,.2);border-radius:8px;background:#14142e;overflow:hidden;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(167,124,255,.55);}
.input-wrap svg{margin:0 10px;flex-shrink:0;color:#9d99bb;}
.input-wrap input{flex:1;border:none;outline:none;padding:12px 12px 12px 0;font-size:14px;color:#f2f0ff;background:transparent;font-family:'Syne',sans-serif;}
.input-wrap input::placeholder{color:rgba(157,153,187,.5);}

/* phone row */
.phone-wrap{display:flex;align-items:center;border:1px solid rgba(167,124,255,.2);border-radius:8px;background:#14142e;overflow:hidden;transition:border-color .2s;}
.phone-wrap:focus-within{border-color:rgba(167,124,255,.55);}
.phone-flag{display:flex;align-items:center;gap:4px;padding:0 10px;border-right:1px solid rgba(167,124,255,.15);font-size:13px;color:#c8c4e8;cursor:pointer;white-space:nowrap;}
.phone-flag select{border:none;outline:none;background:transparent;font-size:13px;color:#c8c4e8;cursor:pointer;appearance:none;padding-right:4px;}
.phone-input{flex:1;border:none;outline:none;padding:12px;font-size:14px;color:#f2f0ff;background:transparent;font-family:'Syne',sans-serif;}
.phone-input::placeholder{color:rgba(157,153,187,.5);}

/* amount row */
.amount-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.amount-label-row label{font-size:13px;font-weight:600;color:#c8c4e8;}
.amount-min{font-size:11px;color:#9d99bb;}
.amount-wrap{display:flex;align-items:center;border:1px solid rgba(167,124,255,.2);border-radius:8px;background:#14142e;overflow:hidden;transition:border-color .2s;}
.amount-wrap:focus-within{border-color:rgba(167,124,255,.55);}
.amount-wrap .rupee{padding:0 10px;font-size:15px;color:#9d99bb;}
.amount-wrap input{flex:1;border:none;outline:none;padding:12px 12px 12px 0;font-size:14px;color:#f2f0ff;background:transparent;font-family:'Syne',sans-serif;}
.amount-wrap input::placeholder{color:rgba(157,153,187,.5);}

/* ── ADDITIONAL INFO ── */
.add-info-title{font-size:16px;font-weight:800;color:#f2f0ff;margin:18px 0 12px;}

/* ── SUMMARY ── */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:#9d99bb;}
.summary-row.total{font-size:15px;font-weight:800;color:#f2f0ff;border-top:1px solid rgba(167,124,255,.15);margin-top:4px;padding-top:12px;}
.summary-row.total .total-amt{color:#22d47a;font-size:16px;font-weight:800;}

/* ── TERMS CHECKBOX ── */
.terms-row{display:flex;align-items:center;gap:8px;margin:14px 0;}
.terms-row input[type=checkbox]{width:16px;height:16px;accent-color:#a67cff;cursor:pointer;flex-shrink:0;}
.terms-row label{font-size:13px;color:#9d99bb;cursor:pointer;}
.terms-row a{color:#a67cff;text-decoration:none;}

/* ── PAY BUTTON ── */
.pay-btn{width:100%;background:#a67cff;color:#fff;border:none;border-radius:8px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:opacity .15s,box-shadow .15s;box-shadow:0 0 24px rgba(166,124,255,.3);}
.pay-btn:hover{opacity:.88;box-shadow:0 0 36px rgba(166,124,255,.5);}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── SECURE FOOTER ── */
.secure-note{text-align:center;font-size:11px;color:#9d99bb;margin-top:12px;}
.payment-logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.payment-logos img{height:24px;width:auto;object-fit:contain;filter:brightness(0) invert(1);opacity:.7;transition:opacity .2s;}
.payment-logos img:hover{opacity:1;}

/* ── MESSAGES ── */
.msg{margin-top:12px;border-radius:8px;padding:12px 14px;font-size:13px;display:none;}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;}
.msg.success{background:rgba(34,212,122,.08);border:1px solid rgba(34,212,122,.25);color:#22d47a;}

/* ── SPINNER ── */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOADING ── */
#loading{text-align:center;padding:60px;color:#9d99bb;}
</style>
</head>
<body>

<div id="loading">Loading product...</div>

<div id="mainWrap" style="display:none;">
  <!-- BLURRED PRODUCT PEEK — click to go back to preview -->
  <div class="product-peek" onclick="goBack()" title="Tap to go back">
    <div class="peek-sec-head"><div class="peek-bar"></div>Description</div>
    <div class="peek-block" id="peekDesc">..</div>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="sheet-wrap">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-title">Payment Details</div>
      <div class="sheet-sub">Please ensure your email and phone number are correct.</div>

      <form id="checkoutForm" autocomplete="off">
        <!-- NAME -->
        <div class="field">
          <label>Name</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
            <input type="text" id="buyerName" placeholder="Enter name" required/>
          </div>
        </div>

        <!-- EMAIL -->
        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M1 5l7 5 7-5"/></svg>
            <input type="email" id="buyerEmail" placeholder="Enter email" required/>
          </div>
        </div>

        <!-- PHONE -->
        <div class="field">
          <label>Phone</label>
          <div class="phone-wrap">
            <div class="phone-flag">
              🇮🇳
              <select id="countryCode">
                <option value="+91">+91</option>
                <option value="+1">+1</option>
                <option value="+44">+44</option>
                <option value="+971">+971</option>
                <option value="+65">+65</option>
              </select>
            </div>
            <input class="phone-input" type="tel" id="buyerPhone" placeholder="Enter phone number"/>
          </div>
        </div>

        <!-- AMOUNT (customer decided) -->
        <div class="field" id="amountField" style="display:none;">
          <div class="amount-label-row">
            <label>Enter Amount</label>
            <span class="amount-min">Minimum Amount (₹1)</span>
          </div>
          <div class="amount-wrap">
            <span class="rupee">₹</span>
            <input type="number" id="buyerAmount" placeholder="Minimum Amount 1" min="1"/>
          </div>
        </div>

        <!-- ADDITIONAL INFO -->
        <div class="add-info-title">Additional Information</div>

        <!-- TOKEN / NOTE -->
        <div class="field">
          <label>Token</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
            <input type="text" id="buyerNote" placeholder="Enter token"/>
          </div>
        </div>

        <div class="sheet-sub" style="text-align:left;margin-bottom:12px;">Please ensure your email and phone number are correct.</div>

        <!-- SUMMARY -->
        <div class="summary-row">
          <span>Entered Amount</span>
          <span id="enteredAmt">₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total Amount</span>
          <span class="total-amt" id="totalAmt">₹0.00</span>
        </div>

        <!-- TERMS -->
        <div class="terms-row">
          <input type="checkbox" id="termsCheck"/>
          <label for="termsCheck">I agree to the <a href="/terms.html">terms and conditions</a></label>
        </div>

        <!-- PAY BUTTON -->
        <button type="submit" class="pay-btn" id="payBtn">
          <span id="payBtnText">Make Payment</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
          <div class="spinner" id="spinner"></div>
        </button>

        <div class="msg" id="msgBox"></div>
      </form>

      <!-- SECURE FOOTER -->
      <div class="secure-note">Guaranteed safe &amp; secure payment</div>
      <div class="payment-logos">
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/phonepe.svg" alt="PhonePe" title="PhonePe"/>
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/googlepay.svg" alt="GPay" title="Google Pay"/>
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/paytm.svg" alt="Paytm" title="Paytm"/>
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/mastercard.svg" alt="Mastercard" title="Mastercard"/>
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/visa.svg" alt="VISA" title="VISA"/>
      </div>
    </div>
  </div>
</div>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script>
function goBack(){
  if(productId)window.location.href=location.origin+'/product-preview.html?id='+encodeURIComponent(productId);
  else history.back();
}
var BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:8000/api':'/api';
var params=new URLSearchParams(location.search);
var productId=params.get('id');
var product=null;
var fixedAmount=0;

// Handle Cashfree return
var returnStatus=params.get('status');
var returnOrderId=params.get('order_id');
if(returnStatus&&productId){
  // Fetch product to get custom redirect URLs
  fetch(BASE+'/products/'+encodeURIComponent(productId))
    .then(function(r){return r.ok?r.json():null;})
    .then(function(p){
      var amt=params.get('amount')||'';
      var name=p?encodeURIComponent(p.name||''):''
      if(returnStatus==='success'){
        var dest=p&&p.success_redirect?p.success_redirect
          :(location.origin+'/payment-success.html?product_id='+encodeURIComponent(productId)+'&product_name='+name+(returnOrderId?'&order_id='+returnOrderId:'')+(amt?'&amount='+amt:''));
        window.location.replace(dest);
      }else{
        var reason=params.get('reason')||'';
        var dest=p&&p.failed_redirect?p.failed_redirect
          :(location.origin+'/payment-failed.html?product_id='+encodeURIComponent(productId)+(reason?'&reason='+encodeURIComponent(reason):''));
        window.location.replace(dest);
      }
    })
    .catch(function(){
      window.location.replace(returnStatus==='success'
        ?location.origin+'/payment-success.html'
        :location.origin+'/payment-failed.html');
    });
}

async function init(){
  if(returnStatus)return; // already redirecting
  if(!productId){document.getElementById('loading').textContent='No product ID provided.';return;}
  try{
    var r=await fetch(BASE+'/products/'+encodeURIComponent(productId));
    if(!r.ok)throw new Error('Not found');
    product=await r.json();
    if(!product||product.status!=='Active')throw new Error('Product unavailable.');
    setup(product);
  }catch(e){document.getElementById('loading').textContent=e.message||'Product not found.';}
}

function setup(p){
  document.getElementById('loading').style.display='none';
  document.getElementById('mainWrap').style.display='block';
  document.title=(p.name||'Checkout')+' | Trendify';

  document.getElementById('peekDesc').innerHTML=p.description||'..';

  var isCustomer=p.price_type==='Customer Decided';
  fixedAmount=isCustomer?0:parseFloat(p.offer_discount&&p.discount_price?p.discount_price:p.amount)||0;

  if(isCustomer){
    document.getElementById('amountField').style.display='block';
    document.getElementById('buyerAmount').required=true;
    updateSummary(0);
    document.getElementById('buyerAmount').addEventListener('input',function(){
      updateSummary(parseFloat(this.value)||0);
    });
  }else{
    updateSummary(fixedAmount);
  }

  if(p.button_text)document.getElementById('payBtnText').textContent=p.button_text;
}

function updateSummary(amt){
  document.getElementById('enteredAmt').textContent='₹'+amt.toLocaleString('en-IN');
  document.getElementById('totalAmt').textContent='₹'+amt.toFixed(2);
}

function showMsg(text,isError){
  var el=document.getElementById('msgBox');
  el.textContent=text;
  el.className='msg '+(isError?'error':'success');
  el.style.display='block';
}

document.getElementById('checkoutForm').addEventListener('submit',async function(e){
  e.preventDefault();
  document.getElementById('msgBox').style.display='none';

  if(!document.getElementById('termsCheck').checked){
    showMsg('Please agree to the terms and conditions.',true);return;
  }

  var name=document.getElementById('buyerName').value.trim();
  var email=document.getElementById('buyerEmail').value.trim();
  var code=document.getElementById('countryCode').value;
  var phone=document.getElementById('buyerPhone').value.trim();
  var note=document.getElementById('buyerNote').value.trim();
  var isCustomer=product&&product.price_type==='Customer Decided';
  var amount=isCustomer?parseFloat(document.getElementById('buyerAmount').value):fixedAmount;

  if(!name||!email){showMsg('Please enter your name and email.',true);return;}
  if(!amount||amount<1){showMsg('Please enter a valid amount (minimum ₹1).',true);return;}

  var btn=document.getElementById('payBtn');
  var sp=document.getElementById('spinner');
  btn.disabled=true;sp.style.display='block';

  try{
    var payload={
      id:'order-'+Date.now(),
      product_id:productId,
      buyer_name:name,
      buyer_email:email,
      buyer_phone:(code+phone).replace(/\s/g,''),
      amount:amount,
      note:note
    };
    var res=await fetch(BASE+'/payments/initiate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    var result=await res.json();
    if(!res.ok)throw new Error(result.detail||result.error||'Payment initiation failed');

    if(result.payment_session_id){
      var cf=Cashfree({mode:result.env==='PROD'?'production':'sandbox'});
      var returnBase=location.origin+'/product.html?id='+encodeURIComponent(productId);
      cf.checkout({
        paymentSessionId:result.payment_session_id,
        returnUrl:returnBase+'&status={status}&order_id={order_id}&amount='+amount
      });
      return;
    }
    if(result.payment_link){window.location.href=result.payment_link;return;}
    throw new Error('No payment link returned.');
  }catch(err){
    showMsg(err.message||'Unable to process payment. Please try again.',true);
  }finally{
    btn.disabled=false;sp.style.display='none';
  }
});

init();
</script>
</body>
</html>
